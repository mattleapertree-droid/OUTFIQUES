<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outfique Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --accent: #f75088;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: #333;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 50px;
      background: rgba(255, 255, 255, 0.95);
      padding: 20px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .logo-nav {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      width: 80px;
      height: auto;
      border-radius: 12px;
      background: #fff;
      padding: 5px;
    }

    .nav {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .nav a {
      text-decoration: none;
      color: white;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: all 0.3s ease;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav a:hover {
      background: white;
      color: var(--primary);
      transform: translateY(-2px);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      color: #fff;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 30px;
      margin-top: 40px;
    }

    .member {
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .photo {
      width: 200px;
      height: 200px;
      margin: 0 auto 15px;
      border-radius: 15px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      border: 4px solid rgba(255, 255, 255, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .member:hover .photo {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      margin-top: 15px;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.5px;
      color: white;
      text-transform: uppercase;
    }

    footer {
      margin-top: 60px;
      text-align: center;
      padding-top: 30px;
      color: rgba(255, 255, 255, 0.8);
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      font-size: 14px;
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        text-align: center;
      }

      .nav {
        justify-content: center;
        width: 100%;
      }

      h1 {
        font-size: 36px;
      }

      .team-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
      }

      .photo {
        width: 160px;
        height: 160px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>

      </div>
      <nav class="nav" aria-label="Primary">
        <a href="index.html">← Home</a>
        <a href="about outfique.html">About</a>
        <a href="wardrobe.html">Wardrobe</a>

      <div class="member">

        <div class="name">BAGUE, SOPHIA ROSE M.</div>
      </div>

      <div class="member">

      <div class="member">
