<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfique Wardrobe - My Collection</title>
    <link rel="stylesheet" href="wardrobe.css">
</head>
<body>
    <div class="wardrobe-container">
        <!-- Header -->
        <header class="wardrobe-header">
            <div class="brand">
                <h1>Outfique Wardrobe</h1>
                <span id="username"></span>
            </div>
            <div class="header-nav">
                <a href="index.html" class="header-link">Home</a>
                <a href="about outfique.html" class="header-link">About</a>
                <a href="team.html" class="header-link">Team</a>
            </div>
            <div class="header-actions">
                <button id="logoutBtn" class="btn-secondary">Logout</button>
            </div>
        </header>

        <!-- Main Wardrobe Area -->
        <div class="wardrobe-main">
            <!-- Daily Outfit Section -->
            <div class="daily-outfit-section">
                <div class="daily-outfit-header">
                    <h2>Today's Outfit</h2>
                    <button id="saveDailyOutfitBtn" class="btn-primary">Save Today's Look</button>
                </div>
                <div class="daily-outfit-display">
                    <div class="outfit-slot" data-category="hat">
                        <div class="slot-label">Hat</div>
                        <div class="slot-content" id="dailyHat">
                            <div class="empty-slot">No hat selected</div>
                        </div>
                        <button class="select-from-drawer-btn" data-category="hat">Select from Wardrobe</button>
                    </div>
                    <div class="outfit-slot" data-category="shirt">
                        <div class="slot-label">Shirt</div>
                        <div class="slot-content" id="dailyShirt">
                            <div class="empty-slot">No shirt selected</div>
                        </div>
                        <button class="select-from-drawer-btn" data-category="shirt">Select from Wardrobe</button>
                    </div>
                    <div class="outfit-slot" data-category="pants">
                        <div class="slot-label">Pants</div>
                        <div class="slot-content" id="dailyPants">
                            <div class="empty-slot">No pants selected</div>
                        </div>
                        <button class="select-from-drawer-btn" data-category="pants">Select from Wardrobe</button>
                    </div>
                    <div class="outfit-slot" data-category="boots">
                        <div class="slot-label">Boots</div>
                        <div class="slot-content" id="dailyBoots">
                            <div class="empty-slot">No boots selected</div>
                        </div>
                        <button class="select-from-drawer-btn" data-category="boots">Select from Wardrobe</button>
                    </div>
                </div>
            </div>

            <!-- Category Tabs -->
            <div class="category-tabs">
                <button class="category-tab active" data-category="hat">
                    <span class="tab-icon">🎩</span>
                    Hats
                </button>
                <button class="category-tab" data-category="shirt">
                    <span class="tab-icon">👕</span>
                    Shirts
                </button>
                <button class="category-tab" data-category="pants">
                    <span class="tab-icon">👖</span>
                    Pants
                </button>
                <button class="category-tab" data-category="boots">
                    <span class="tab-icon">🥾</span>
                    Boots
                </button>
            </div>

            <!-- Drawer Container -->
            <div class="drawer-container">
                <!-- Generation Panel -->
                <div class="generation-panel">
                    <h3>Generate New Item</h3>
                    <div class="form-group">
                        <label for="itemDescription">Description</label>
                        <input type="text" id="itemDescription" placeholder="e.g., red leather jacket, casual style">
                    </div>
                    <div class="form-group">
                        <label for="itemStyle">Style</label>
                        <select id="itemStyle">
                            <option value="casual">Casual</option>
                            <option value="formal">Formal</option>
                            <option value="vintage">Vintage</option>
                            <option value="modern">Modern</option>
                            <option value="streetwear">Streetwear</option>
                            <option value="bohemian">Bohemian</option>
                            <option value="minimalist">Minimalist</option>
                        </select>
                    </div>
                    <button id="generateBtn" class="btn-primary">Generate Item</button>
                    <div id="generationStatus" class="status-message"></div>
                </div>

                <!-- Wardrobe Drawer -->
                <div class="wardrobe-drawer">
                    <div class="drawer-header">
                        <h3 id="drawerTitle">My Hats</h3>
                        <span id="itemCount" class="item-count">0 items</span>
                    </div>

                    <div id="wardrobeGrid" class="wardrobe-grid">
                        <!-- Items will be loaded here -->
                    </div>

                    <div id="emptyState" class="empty-state">
                        <div class="empty-icon">👕</div>
                        <h4>No items yet</h4>
                        <p>Generate your first clothing item to get started!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Item Detail Modal -->
        <div id="itemModal" class="modal">
            <div class="modal-content large">
                <span class="close">&times;</span>
                <div class="item-detail">
                    <div class="item-image">
                        <img id="modalImage" src="" alt="Clothing item">
                    </div>
                    <div class="item-info">
                        <h3 id="modalTitle">Item Details</h3>
                        <div class="item-meta">
                            <span id="modalCategory" class="category-badge"></span>
                            <span id="modalStyle" class="style-badge"></span>
                            <span id="modalDate" class="date-badge"></span>
                        </div>
                        <p id="modalDescription" class="item-description"></p>
                        <div class="item-actions">
                            <button id="editBtn" class="btn-secondary">Edit Style</button>
                            <button id="deleteBtn" class="btn-danger">Delete Item</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Modal -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h3>Edit Item Style</h3>
                <div class="form-group">
                    <label for="editStyle">New Style</label>
                    <select id="editStyle">
                        <option value="casual">Casual</option>
                        <option value="formal">Formal</option>
                        <option value="vintage">Vintage</option>
                        <option value="modern">Modern</option>
                        <option value="streetwear">Streetwear</option>
                        <option value="bohemian">Bohemian</option>
                        <option value="minimalist">Minimalist</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editDescription">Update Description</label>
                    <input type="text" id="editDescription" placeholder="Updated description">
                </div>
                <button id="saveEditBtn" class="btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="wardrobe.js"></script>
    <script src="wardrobe-smart-upgrade.js"></script>
</body>
</html>
