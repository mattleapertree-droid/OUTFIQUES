<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outfique Wardrobe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Great+Vibes&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wardrobe-container">
    <header class="wardrobe-header">
      <div class="brand">
        <img src="DESIGN NI JARED.png" alt="Outfique logo" class="brand-logo">
        <div>
          <h1>Outfique Wardrobe</h1>
          <span id="username"></span>
        </div>
      </div>

      <nav class="header-nav">
        <a href="index.html" class="header-link">Home</a>
        <a href="about.html" class="header-link">About</a>
        <a href="team.html" class="header-link">Team</a>
      </nav>

      <div class="header-actions">
        <button id="logoutBtn" class="btn-secondary" type="button">Logout</button>
      </div>
    </header>

    <div class="wardrobe-main">
      <section class="daily-outfit-section">
        <div class="daily-outfit-header">
          <h2>Today's Outfit</h2>
          <button id="saveDailyOutfitBtn" class="btn-primary" type="button">Save Today's Look</button>
        </div>

        <div class="daily-outfit-display">
          <div class="outfit-slot" data-category="hat">
            <div class="slot-label">Hat</div>
            <div class="slot-content" id="dailyHat"><div class="empty-slot">No hat selected</div></div>
            <button class="select-from-drawer-btn" data-category="hat" type="button">Select from Wardrobe</button>
          </div>

          <div class="outfit-slot" data-category="shirt">
            <div class="slot-label">Shirt</div>
            <div class="slot-content" id="dailyShirt"><div class="empty-slot">No shirt selected</div></div>
            <button class="select-from-drawer-btn" data-category="shirt" type="button">Select from Wardrobe</button>
          </div>

          <div class="outfit-slot" data-category="pants">
            <div class="slot-label">Pants / Shorts</div>
            <div class="slot-content" id="dailyPants"><div class="empty-slot">No pants selected</div></div>
            <button class="select-from-drawer-btn" data-category="pants" type="button">Select from Wardrobe</button>
          </div>

          <div class="outfit-slot" data-category="boots">
            <div class="slot-label">Boots / Shoes</div>
            <div class="slot-content" id="dailyBoots"><div class="empty-slot">No shoes selected</div></div>
            <button class="select-from-drawer-btn" data-category="boots" type="button">Select from Wardrobe</button>
          </div>
        </div>
      </section>

      <aside class="generation-panel">
        <h2>Add to Wardrobe</h2>

        <div class="form-group">
          <label for="itemStyle">Style</label>
          <select id="itemStyle">
            <option value="casual">Casual</option>
            <option value="formal">Formal</option>
            <option value="vintage">Vintage</option>
            <option value="modern" selected>Modern</option>
            <option value="streetwear">Streetwear</option>
            <option value="bohemian">Bohemian</option>
            <option value="minimalist">Minimalist</option>
          </select>
        </div>

        <div class="form-group">
          <label for="itemDescription">Description</label>
          <input type="text" id="itemDescription" placeholder="Example: beige formal blouse">
        </div>

        <button id="generateBtn" class="btn-primary full-width" type="button">Generate Item</button>
        <button id="openCameraBtn" class="btn-secondary full-width" type="button">📸 Capture from Camera</button>
        <div id="messageArea" class="status-message"></div>
      </aside>
    </div>

    <section class="category-section">
      <div class="category-tabs">
        <button class="category-tab active" data-category="hat" type="button">Hat</button>
        <button class="category-tab" data-category="shirt" type="button">Shirt</button>
        <button class="category-tab" data-category="pants" type="button">Pants / Shorts</button>
        <button class="category-tab" data-category="boots" type="button">Boots / Shoes</button>
      </div>

      <div class="drawer-panel">
        <div class="drawer-header">
          <h2 id="drawerTitle">Hat Drawer</h2>
        </div>
        <div id="wardrobeGrid" class="wardrobe-grid"></div>
      </div>
    </section>
  </div>

  <div class="modal hidden" id="editModal">
    <div class="modal-content">
      <button class="close-btn" id="closeEditModal" type="button">&times;</button>
      <h3>Edit Item</h3>

      <div class="form-group">
        <label for="editStyle">Update Style</label>
        <select id="editStyle">
          <option value="casual">Casual</option>
          <option value="formal">Formal</option>
          <option value="vintage">Vintage</option>
          <option value="modern">Modern</option>
          <option value="streetwear">Streetwear</option>
          <option value="bohemian">Bohemian</option>
          <option value="minimalist">Minimalist</option>
        </select>
      </div>

      <div class="form-group">
        <label for="editDescription">Update Description</label>
        <input type="text" id="editDescription" placeholder="Updated description">
      </div>

      <button id="saveEditBtn" class="btn-primary full-width" type="button">Save Changes</button>
    </div>
  </div>

  <div class="modal hidden" id="cameraModal">
    <div class="modal-content camera-modal">
      <button class="close-btn" id="closeCameraModal" type="button">&times;</button>
      <h3>📸 Capture Clothing</h3>
      <p class="modal-subtitle">Take a photo or upload an image of your clothing item</p>

      <div class="camera-container" id="cameraContainer">
        <video id="cameraFeed" autoplay webkit-playsinline playsinline></video>
        <div class="camera-overlay">
          <div class="camera-frame"></div>
        </div>
      </div>

      <div class="camera-controls">
        <button id="capturePhotoBtn" class="btn-primary" type="button">📷 Capture</button>
        <button id="toggleCameraBtn" class="btn-secondary" type="button">📹 Start Camera</button>
        <button id="uploadFileBtn" class="btn-secondary" type="button">📁 Upload</button>
        <input type="file" id="fileInput" class="hidden-file-input" accept="image/*" title="Select an image file for upload">
      </div>

      <div id="capturePreview" class="capture-preview hidden">
        <img id="previewImage" src="" alt="Preview">
        <div class="preview-actions">
          <button id="retakeBtn" class="btn-secondary" type="button">🔄 Retake</button>
          <button id="usePhotoBtn" class="btn-primary" type="button">✓ Use Photo</button>
        </div>
      </div>

      <div id="clothingForm" class="clothing-form hidden">
        <h4>Add to Wardrobe</h4>
        
        <div class="form-group">
          <label for="cameraCategory">Category</label>
          <select id="cameraCategory">
            <option value="">Select Category</option>
            <option value="hat">Hat</option>
            <option value="shirt">Shirt</option>
            <option value="pants">Pants</option>
            <option value="boots">Boots</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cameraStyle">Style</label>
          <select id="cameraStyle">
            <option value="casual">Casual</option>
            <option value="formal">Formal</option>
            <option value="vintage">Vintage</option>
            <option value="modern" selected>Modern</option>
            <option value="streetwear">Streetwear</option>
            <option value="bohemian">Bohemian</option>
            <option value="minimalist">Minimalist</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cameraDescription">Description</label>
          <input type="text" id="cameraDescription" placeholder="E.g., Blue casual cotton shirt">
        </div>

        <button id="savePhotoBtn" class="btn-primary full-width" type="button">Save to Wardrobe</button>
        <div id="cameraMessage" class="status-message"></div>
      </div>
    </div>
  </div>

  <script src="wardrobe-smart-upgrade.js"></script>
</body>
</html>
